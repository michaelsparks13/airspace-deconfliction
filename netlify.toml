# Netlify deploy config.
#
# The tile pack (public/tiles/) is gitignored — it's a derived artifact of
# scripts/fetch-tiles.ts. Build pulls it down before vite builds, so the
# resulting dist/ contains the full offline tile set.

[build]
	command = "npm run fetch-tiles && npm run build"
	publish = "dist"

[build.environment]
	NODE_VERSION = "24"

# Long cache for the tile pack — these are immutable PNG tiles.
[[headers]]
	for = "/tiles/*"
	[headers.values]
		Cache-Control = "public, max-age=31536000, immutable"

# Vite hashes assets — long cache.
[[headers]]
	for = "/assets/*"
	[headers.values]
		Cache-Control = "public, max-age=31536000, immutable"
